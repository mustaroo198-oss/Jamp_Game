<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jump Game - Persistent Level Edition</title>
    <style>
        :root { --primary: #2563eb; --bg-dark: #020617; --card-bg: #ffffff; }
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); display: flex; justify-content: center; align-items: center; height: 100vh; touch-action: none; }
        
        #login-container { position: absolute; z-index: 100; background: var(--card-bg); padding: 2rem; border-radius: 1.5rem; width: 90%; max-width: 400px; }
        #loading-screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); z-index: 200; flex-direction: column; justify-content: center; align-items: center; color: white; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #game-container { display: none; width: 100%; height: 100%; position: relative; }
        canvas { background: linear-gradient(to bottom, #0f172a, #020617); display: block; margin: 0 auto; }
        
        #game-ui { position: absolute; top: 15px; width: 100%; display: flex; flex-direction: column; align-items: center; color: #fff; pointer-events: none; z-index: 10; }
        .top-bar { width: 95%; max-width: 450px; display: flex; justify-content: space-between; align-items: center; }
        
        .center-stats { 
            position: absolute; left: 50%; transform: translateX(-50%); 
            display: flex; gap: 10px; align-items: center;
        }

        .level-badge { background: #ef4444; padding: 5px 12px; border-radius: 12px; font-size: 14px; font-weight: bold; }
        .timer-badge { background: rgba(255, 255, 255, 0.2); padding: 5px 12px; border-radius: 12px; font-size: 14px; font-family: monospace; border: 1px solid rgba(255,255,255,0.3); }
        
        #score { font-size: 40px; font-weight: bold; margin-top: 10px; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 0.8rem; margin-bottom: 1rem; border: 1px solid #e2e8f0; border-radius: 0.6rem; text-align: right; box-sizing: border-box; }
        button { width: 100%; padding: 0.8rem; background: var(--primary); color: white; border: none; border-radius: 0.6rem; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

<div id="login-container">
    <h2 style="text-align:center">تسجيل الدخول</h2>
    <input type="email" id="loginEmail" placeholder="الإيميل">
    <input type="password" id="loginPass" placeholder="كلمة المرور">
    <button onclick="checkLogin()">دخول</button>
</div>

<div id="loading-screen">
    <div class="loader"></div>
    <div>جاري مزامنة ليفل اللاعب...</div>
</div>

<div id="game-container">
    <div id="game-ui">
        <div class="top-bar">
            <div style="color: #fbbf24; font-weight: bold;">🏆 <span id="highScore">0</span></div>
            <div class="center-stats">
                <div class="level-badge">⭐ ليفل <span id="levelDisplay">1</span></div>
                <div class="timer-badge">⏱️ <span id="timeDisplay">03:00</span></div>
            </div>
            <div id="lives">❤️❤️❤️</div>
        </div>
        <div id="score">0</div>
    </div>
    <canvas id="gameCanvas"></canvas>
</div>

<script>
    let isGameRunning = false;
    let canvas, ctx, scoreElement, highScoreElement, livesElement, levelDisplay, timeDisplay;
    let score = 0, highScore = localStorage.getItem('jumpGameHighScore') || 0, lives = 3;
    let currentLevel = parseInt(localStorage.getItem('jumpGameLevel')) || 1;
    let player, platforms = [], keys = {}, touchX = null;
    let gravity = 0.6;
    let timeLeft = 180; 
    let timerInterval;

    function checkLogin() {
        if (document.getElementById('loginEmail').value === "admin@game.com" && document.getElementById('loginPass').value === "123456") {
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('loading-screen').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('game-container').style.display = 'block';
                if (!isGameRunning) { setupGame(); isGameRunning = true; }
            }, 1500);
        }
    }

    function setupGame() {
        canvas = document.getElementById('gameCanvas');
        ctx = canvas.getContext('2d');
        scoreElement = document.getElementById('score');
        highScoreElement = document.getElementById('highScore');
        livesElement = document.getElementById('lives');
        levelDisplay = document.getElementById('levelDisplay');
        timeDisplay = document.getElementById('timeDisplay');
        
        highScoreElement.innerText = highScore;
        levelDisplay.innerText = currentLevel;

        window.addEventListener('resize', resize);
        resize();

        resetPlayerStats();

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);
        canvas.addEventListener('touchstart', e => touchX = e.touches[0].clientX);
        canvas.addEventListener('touchend', () => touchX = null);

        initLevel();
        startMasterTimer();
        gameLoop();
    }

    function resetPlayerStats() {
        let playerSpeed = 10 + (currentLevel * 0.5);
        player = { x: canvas.width / 2 - 17, y: canvas.height - 120, w: 35, h: 45, vx: 0, vy: 0, jump: -16, speed: playerSpeed };
    }

    function startMasterTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timeLeft = 180; // يبدأ دائماً من 3 دقائق
        updateTimerDisplay();
        
        timerInterval = setInterval(() => {
            timeLeft--;
            updateTimerDisplay();

            if (timeLeft <= 0) {
                currentLevel++;
                localStorage.setItem('jumpGameLevel', currentLevel);
                levelDisplay.innerText = currentLevel;
                player.speed += 0.5;
                timeLeft = 180; 
            }
        }, 1000);
    }

    function updateTimerDisplay() {
        let mins = Math.floor(timeLeft / 60);
        let secs = timeLeft % 60;
        timeDisplay.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    function resize() {
        canvas.width = (window.innerWidth > 500) ? 450 : window.innerWidth;
        canvas.height = window.innerHeight;
    }

    function initLevel() {
        platforms = [];
        platforms.push({x: 0, y: canvas.height - 60, w: canvas.width, h: 25, scored: true, color: '#334155'});
        for (let i = 1; i < 500; i++) {
            let width = 85 + Math.random() * 45;
            platforms.push({
                x: Math.random() * (canvas.width - width),
                y: canvas.height - (i * 105),
                w: width, h: 15, scored: false, color: '#10b981'
            });
        }
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    function update() {
        if (keys['ArrowRight'] || keys['KeyD'] || (touchX !== null && touchX > canvas.width / 2)) player.vx = player.speed;
        else if (keys['ArrowLeft'] || keys['KeyA'] || (touchX !== null && touchX < canvas.width / 2)) player.vx = -player.speed;
        else player.vx = 0;

        player.vy += gravity;
        player.x += player.vx;
        player.y += player.vy;

        if (player.x < 0) player.x = 0;
        if (player.x + player.w > canvas.width) player.x = canvas.width - player.w;

        platforms.forEach(plat => {
            if (player.vy > 0 && player.x + player.w > plat.x && player.x < plat.x + plat.w && player.y + player.h > plat.y && player.y + player.h < plat.y + plat.h + 15) {
                player.vy = player.jump;
                if (!plat.scored) {
                    plat.scored = true;
                    score++;
                    scoreElement.innerText = score;
                    if (score > highScore) {
                        highScore = score;
                        highScoreElement.innerText = highScore;
                        localStorage.setItem('jumpGameHighScore', highScore);
                    }
                }
            }
        });

        if (player.y < canvas.height * 0.4) {
            let diff = canvas.height * 0.4 - player.y;
            player.y += diff;
            platforms.forEach(plat => plat.y += diff);
        }

        if (player.y > canvas.height) {
            lives--;
            updateLivesUI();
            if (lives > 0) respawnOnPlatform();
            else gameOver();
        }
    }

    function respawnOnPlatform() {
        let safePlat = platforms.find(p => p.y > canvas.height / 2 && p.y < canvas.height - 100);
        if (safePlat) {
            player.x = safePlat.x + (safePlat.w / 2) - (player.w / 2);
            player.y = safePlat.y - player.h - 20;
        } else {
            player.y = 100; player.x = canvas.width / 2;
        }
        player.vy = 0; player.vx = 0;
    }

    function gameOver() {
        alert("انتهت القلوب! سيتم تصفير عداد الوقت مع الحفاظ على الليفل.");
        score = 0; 
        scoreElement.innerText = "0";
        lives = 3; 
        updateLivesUI();
        
        // تصفير عداد الوقت ليدأ من 3 دقائق مجدداً
        startMasterTimer(); 
        
        // الحفاظ على موقع اللاعب والمساطب
        resetPlayerStats();
        initLevel();
    }

    function updateLivesUI() {
        let h = "";
        for(let i=0; i<lives; i++) h += "❤️";
        livesElement.innerText = h || "💔";
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        platforms.forEach(plat => {
            ctx.fillStyle = plat.color;
            ctx.beginPath(); ctx.roundRect(plat.x, plat.y, plat.w, plat.h, 6); ctx.fill();
        });
        ctx.fillStyle = "#fbbf24";
        ctx.beginPath(); ctx.roundRect(player.x, player.y, player.w, player.h, 8); ctx.fill();
        ctx.fillStyle = "black";
        let eyeX = player.vx >= 0 ? player.x + 22 : player.x + 8;
        ctx.fillRect(eyeX, player.y + 12, 6, 6);
    }
</script>
</body>
</html>
