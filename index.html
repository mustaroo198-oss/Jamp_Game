<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jump Game Pro - Final Edition</title>
    <style>
        :root { --primary: #2563eb; --bg-dark: #020617; --card-bg: #ffffff; }
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); display: flex; justify-content: center; align-items: center; height: 100vh; touch-action: none; }
        
        #login-container { position: absolute; z-index: 100; background: var(--card-bg); padding: 2rem; border-radius: 1.5rem; width: 90%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; }
        #loading-screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); z-index: 200; flex-direction: column; justify-content: center; align-items: center; color: white; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #game-container { display: none; width: 100%; height: 100%; position: relative; overflow: hidden; }
        canvas { display: block; margin: 0 auto; transition: background 0.8s ease-in-out; } 
        
        #game-ui { position: absolute; top: 15px; width: 100%; display: flex; flex-direction: column; align-items: center; color: #fff; pointer-events: none; z-index: 10; }
        .top-bar { width: 95%; max-width: 450px; display: flex; justify-content: space-between; align-items: center; }
        .center-stats { position: absolute; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; align-items: center; }
        .level-badge { background: #ef4444; padding: 5px 12px; border-radius: 12px; font-size: 14px; font-weight: bold; }
        .timer-badge { background: rgba(255, 255, 255, 0.2); padding: 5px 12px; border-radius: 12px; font-size: 14px; font-family: monospace; border: 1px solid rgba(255,255,255,0.3); }
        #passed-counter { font-size: 50px; font-weight: 900; background: rgba(0,0,0,0.3); padding: 5px 30px; border-radius: 50px; color: #ffffff; text-shadow: 0 4px 10px rgba(0,0,0,0.5); margin-top: 10px; }

        input { width: 100%; padding: 0.8rem; margin-bottom: 1rem; border: 1px solid #e2e8f0; border-radius: 0.6rem; text-align: right; box-sizing: border-box; }
        button { width: 100%; padding: 0.8rem; background: var(--primary); color: white; border: none; border-radius: 0.6rem; font-weight: 600; cursor: pointer; }

        /* أزرار التحكم للهاتف */
        #mobile-controls { position: absolute; bottom: 30px; width: 100%; display: none; justify-content: space-between; padding: 0 25px; box-sizing: border-box; z-index: 50; }
        .control-btn { width: 75px; height: 75px; background: rgba(255, 255, 255, 0.15); border: 2px solid rgba(255, 255, 255, 0.3); border-radius: 50%; color: white; font-size: 28px; display: flex; justify-content: center; align-items: center; pointer-events: auto; user-select: none; -webkit-tap-highlight-color: transparent; }
        .control-btn:active { background: rgba(255, 255, 255, 0.4); transform: scale(0.9); }

        @media (max-width: 768px) { #mobile-controls { display: flex; } }
    </style>
</head>
<body>

<audio id="bgMusic" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<div id="login-container">
    <h2 style="color: var(--primary)">_____________Join Game______________</h2>
    <input type="text" id="loginUser" placeholder="اسم المستخدم">
    <input type="password" id="loginPass" placeholder="كلمة المرور ">
    <button onclick="checkLogin()">ابدأ الحماس 🎶</button>
    <p style="margin-top: 15px; font-weight: bold; color: #ef4444;">لو كملت ليفل 10 ليك مكافأة من صانع اللعبة 🎁</p>
</div>

<div id="loading-screen">
    <div class="loader"></div>
    <div>جاري ضبط الإيقاع وتحميل العالم...</div>
</div>

<div id="game-container">
    <div id="game-ui">
        <div class="top-bar">
            <div style="color: #fbbf24; font-weight: bold;">🏆 <span id="highScore">0</span></div>
            <div class="center-stats">
                <div class="level-badge">⭐ ليفل <span id="levelDisplay">1</span></div>
                <div class="timer-badge">⏱️ <span id="timeDisplay">03:00</span></div>
            </div>
            <div id="lives">❤️❤️❤️</div>
        </div>
        <div id="passed-counter">0</div>
    </div>
    
    <canvas id="gameCanvas"></canvas>

    <div id="mobile-controls">
        <div id="btn-left" class="control-btn">◀</div>
        <div id="btn-right" class="control-btn">▶</div>
    </div>
</div>

<script>
    let isGameRunning = false;
    let canvas, ctx, highScoreElement, livesElement, levelDisplay, timeDisplay, passedElement;
    let score = 0, highScore = localStorage.getItem('jumpGameHighScore') || 0, lives = 3, platformsPassed = 0;
    let currentLevel = parseInt(localStorage.getItem('jumpGameLevel')) || 1;
    let player, platforms = [], keys = {}, touchX = null;
    let gravity = 0.6;
    let timeLeft = 180; 
    let timerInterval;
    const bgMusic = document.getElementById('bgMusic');

    const backgrounds = [
        'linear-gradient(to bottom, #0f172a, #020617)', 'linear-gradient(to bottom, #1e1b4b, #312e81)',
        'linear-gradient(to bottom, #134e4a, #0d9488)', 'linear-gradient(to bottom, #064e3b, #059669)',
        'linear-gradient(to bottom, #422006, #92400e)', 'linear-gradient(to bottom, #450a0a, #991b1b)',
        'linear-gradient(to bottom, #581c87, #7e22ce)', 'linear-gradient(to bottom, #1e3a8a, #3b82f6)',
        'linear-gradient(to bottom, #312e81, #4338ca)', 'linear-gradient(to bottom, #171717, #404040)'
    ];

    function checkLogin() {
        if (document.getElementById('loginUser').value === "admin" && document.getElementById('loginPass').value === "123456") {
            bgMusic.play().catch(() => {});
            bgMusic.volume = 0.4;
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('loading-screen').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('game-container').style.display = 'block';
                if (!isGameRunning) { setupGame(); isGameRunning = true; }
            }, 1500);
        } else { alert("بيانات غير صحيحة!"); }
    }

    function setupGame() {
        canvas = document.getElementById('gameCanvas');
        ctx = canvas.getContext('2d');
        highScoreElement = document.getElementById('highScore');
        livesElement = document.getElementById('lives');
        levelDisplay = document.getElementById('levelDisplay');
        timeDisplay = document.getElementById('timeDisplay');
        passedElement = document.getElementById('passed-counter');
        
        highScoreElement.innerText = highScore;
        levelDisplay.innerText = currentLevel;

        window.addEventListener('resize', resize);
        resize();
        resetPlayerStats();
        updateMusicSpeed();

        // تحكم الكيبورد
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);
        
        // تحكم أزرار الشاشة (الجوال)
        const btnLeft = document.getElementById('btn-left');
        const btnRight = document.getElementById('btn-right');

        btnLeft.addEventListener('touchstart', (e) => { touchX = 10; e.preventDefault(); }, {passive: false});
        btnLeft.addEventListener('touchend', () => { touchX = null; });
        btnRight.addEventListener('touchstart', (e) => { touchX = canvas.width - 10; e.preventDefault(); }, {passive: false});
        btnRight.addEventListener('touchend', () => { touchX = null; });

        initLevel();
        startMasterTimer();
        gameLoop();
    }

    function resetPlayerStats() {
        let playerSpeed = 10 + (currentLevel * 0.5);
        player = { x: canvas.width / 2 - 17, y: canvas.height - 120, w: 35, h: 45, vx: 0, vy: 0, jump: -16, speed: playerSpeed };
        platformsPassed = 0;
    }

    function updateMusicSpeed() {
        let newRate = 1 + (currentLevel - 1) * 0.07;
        bgMusic.playbackRate = Math.min(newRate, 2.0);
    }

    function startMasterTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timeLeft = 180;
        updateTimerDisplay();
        timerInterval = setInterval(() => {
            timeLeft--;
            updateTimerDisplay();
            if (timeLeft <= 0) {
                currentLevel++;
                if(currentLevel === 10) alert("🎁 مكافأتك هي الكود: M10RA");
                localStorage.setItem('jumpGameLevel', currentLevel);
                levelDisplay.innerText = currentLevel;
                player.speed += 0.5;
                updateMusicSpeed();
                timeLeft = 180; 
            }
        }, 1000);
    }

    function updateTimerDisplay() {
        let mins = Math.floor(timeLeft / 60);
        let secs = timeLeft % 60;
        timeDisplay.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    function resize() {
        canvas.width = (window.innerWidth > 500) ? 450 : window.innerWidth;
        canvas.height = window.innerHeight;
    }

    function initLevel() {
        platforms = [];
        platforms.push({x: 0, y: canvas.height - 60, w: canvas.width, h: 25, touched: true, passed: true, color: '#334155'});
        for (let i = 1; i < 2000; i++) {
            let width = 85 + Math.random() * 45;
            platforms.push({
                x: Math.random() * (canvas.width - width),
                y: canvas.height - (i * 105),
                w: width, h: 15, touched: false, passed: false, color: '#10b981'
            });
        }
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    function update() {
        // منطق الحركة (كيبورد + أزرار شاشة)
        if (keys['ArrowRight'] || keys['KeyD'] || (touchX !== null && touchX > canvas.width / 2)) player.vx = player.speed;
        else if (keys['ArrowLeft'] || keys['KeyA'] || (touchX !== null && touchX < canvas.width / 2)) player.vx = -player.speed;
        else player.vx = 0;

        player.vy += gravity;
        player.x += player.vx;
        player.y += player.vy;

        if (player.x < 0) player.x = 0;
        if (player.x + player.w > canvas.width) player.x = canvas.width - player.w;

        platforms.forEach(plat => {
            if (player.vy > 0 && player.x + player.w > plat.x && player.x < plat.x + plat.w && player.y + player.h > plat.y && player.y + player.h < plat.y + plat.h + 15) {
                player.vy = player.jump;
                plat.touched = true;
            }
            if (!plat.passed && player.y + player.h < plat.y) {
                plat.passed = true;
                platformsPassed++;
                passedElement.innerText = platformsPassed;
                if (platformsPassed > highScore) {
                    highScore = platformsPassed;
                    highScoreElement.innerText = highScore;
                    localStorage.setItem('jumpGameHighScore', highScore);
                }
            }
        });

        if (player.y < canvas.height * 0.4) {
            let diff = canvas.height * 0.4 - player.y;
            player.y += diff;
            platforms.forEach(plat => plat.y += diff);
        }

        if (player.y > canvas.height) {
            lives--;
            updateLivesUI();
            if (lives > 0) respawnOnPlatform();
            else gameOver();
        }
    }

    function respawnOnPlatform() {
        let safePlat = platforms.find(p => p.y > canvas.height / 2 && p.y < canvas.height - 100);
        if (safePlat) {
            player.x = safePlat.x + (safePlat.w / 2) - (player.w / 2);
            player.y = safePlat.y - player.h - 20;
        } else { player.y = 100; player.x = canvas.width / 2; }
        player.vy = 0; player.vx = 0;
    }

    function gameOver() {
        alert("انتهت المحاولات!");
        platformsPassed = 0;
        passedElement.innerText = "0";
        lives = 3; 
        currentLevel = 1;
        updateLivesUI();
        updateMusicSpeed();
        startMasterTimer(); 
        resetPlayerStats();
        initLevel();
    }

    function updateLivesUI() {
        let h = "";
        for(let i=0; i<lives; i++) h += "❤️";
        livesElement.innerText = h || "💔";
    }

    function draw() {
        let bgIndex = Math.floor(platformsPassed / 20) % backgrounds.length;
        canvas.style.background = backgrounds[bgIndex];
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        platforms.forEach(plat => {
            ctx.fillStyle = plat.color;
            ctx.beginPath(); ctx.roundRect(plat.x, plat.y, plat.w, plat.h, 6); ctx.fill();
        });
        ctx.fillStyle = "#fbbf24";
        ctx.beginPath(); ctx.roundRect(player.x, player.y, player.w, player.h, 8); ctx.fill();
        ctx.fillStyle = "black";
        let eyeX = player.vx >= 0 ? player.x + 22 : player.x + 8;
        ctx.fillRect(eyeX, player.y + 12, 6, 6);
    }
</script>
</body>
</html>
